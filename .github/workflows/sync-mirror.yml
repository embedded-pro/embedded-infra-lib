---
name: Sync Mirror Repository

# Minimal top-level permissions
permissions:
  contents: read

on:
  schedule:
    - cron: "0 2 1 * *"
  workflow_dispatch: {}

jobs:
  sync-mirror:
    runs-on: ubuntu-latest
    # Minimal permissions - sync action will need contents:write via token
    permissions:
      contents: write # Required for sync action to create branches/PRs
      pull-requests: write # Required to create and manage PRs
      actions: read # Required to read action metadata

    env:
      MIRROR_URL: >
        https://gitlab.com/embedded-library/mirrors/amp-embedded-infra-lib.git
      MIRROR_BRANCH: "main"
      TARGET_BRANCH: "main"
      SYNC_BRANCH_PREFIX: "sync-mirror"
      ACTIVITY_PERIOD: "1 month ago"

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup environment
        run: |
          echo "🔄 Starting mirror sync process..."
          echo "📂 Mirror URL: ${{ env.MIRROR_URL }}"
          echo "🌿 Mirror branch: ${{ env.MIRROR_BRANCH }}"
          echo "🎯 Target branch: ${{ env.TARGET_BRANCH }}"
          echo "📅 Scheduled run: ${{ github.event_name == 'schedule' }}"
          
          echo "📋 Action inputs:"
          echo "  - mirror-url: ${{ env.MIRROR_URL }}"
          echo "  - mirror-branch: ${{ env.MIRROR_BRANCH }}"
          echo "  - target-branch: ${{ env.TARGET_BRANCH }}"
          echo "  - sync-branch-prefix: ${{ env.SYNC_BRANCH_PREFIX }}"
          echo "  - check-activity: ${{ github.event_name == 'schedule' }}"
          echo "  - activity-period: ${{ env.ACTIVITY_PERIOD }}"
          
          echo "🚀 Environment setup completed successfully"

      - name: Sync mirror repository
        id: sync
        uses: ./.github/sync-mirror
        with:
          mirror-url: ${{ env.MIRROR_URL }}
          mirror-branch: ${{ env.MIRROR_BRANCH }}
          target-branch: ${{ env.TARGET_BRANCH }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          mirror-username: ${{ secrets.GITLAB_TOKEN_USERNAME }}
          mirror-token: ${{ secrets.GITLAB_TOKEN_PASSWORD }}
          sync-branch-prefix: "sync-mirror"
          check-activity: ${{ github.event_name == 'schedule' }}
          activity-period: "1 month ago"
          force-sync: false

      - name: Handle results
        if: always() && steps.sync.conclusion != 'skipped'
        run: |
          SYNC_SKIPPED="${{ steps.sync.outputs.sync-skipped }}"
          CHANGES_DETECTED="${{ steps.sync.outputs.changes-detected }}"
          PR_NUMBER="${{ steps.sync.outputs.pr-number }}"
          PR_URL="${{ steps.sync.outputs.pr-url }}"
          
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Mirror Sync Results
          
          **Configuration:**
          - Mirror URL: ${{ env.MIRROR_URL }}
          - Mirror Branch: ${{ env.MIRROR_BRANCH }}
          - Target Branch: ${{ env.TARGET_BRANCH }}
          
          EOF
          
          if [ "$SYNC_SKIPPED" = "true" ]; then
            echo "ℹ️ Sync skipped due to no recent activity in mirror repository"
            cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ℹ️ Sync skipped due to no recent activity:
          
          - **Activity Period**: ${{ env.ACTIVITY_PERIOD }}
          
          No commits found in the specified period.
          EOF
          elif [ "$CHANGES_DETECTED" = "true" ]; then
            echo "✅ Successfully created PR #${PR_NUMBER}"
            echo "🔗 PR URL: ${PR_URL}"
            cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ✅ Successfully synced changes from mirror repository:
          
          - **PR Number**: #${PR_NUMBER}
          - **PR URL**: ${PR_URL}
          
          Please review and merge the PR when ready.
          EOF
          else
            echo "ℹ️ No changes detected from mirror repository"
            cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ℹ️ No changes detected from mirror repository.
          
          The mirror repository is up to date with the target branch.
          EOF
          fi

      - name: Handle failure
        if: failure()
        run: |
          echo "❌ Mirror sync workflow failed"
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Mirror Sync Failed ❌
          
          The mirror sync workflow failed. Possible causes:
          
          - **Authentication issues**: Check GITLAB_TOKEN_USERNAME and GITLAB_TOKEN_PASSWORD secrets
          - **Network issues**: Mirror repository might be unreachable
          - **Merge conflicts**: Manual resolution may be required
          - **Permission issues**: Check repository permissions
          
          **Configuration:**
          - Mirror URL: ${{ env.MIRROR_URL }}
          - Mirror Branch: ${{ env.MIRROR_BRANCH }}
          - Target Branch: ${{ env.TARGET_BRANCH }}
          
          Please check the workflow logs for more details.
          EOF
