---
name: Validate Pull-Request

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize

permissions: {}

jobs:
  validate-pr-title:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: amannn/action-semantic-pull-request@0723387faaf9b38adef4775cd42cfd5155ed6017 # v5.5.3
        id: pr-title
        with:
          access_token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          body: false
          issue: false
